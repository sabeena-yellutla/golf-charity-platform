<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <!-- Google fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS  -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
</head>

<body>
    <div class="dashboard d-flex">

        <!-- SIDEBAR -->
        <aside class="sidebar p-3">
            <h4 class="logo mb-4">DrawFor<span>Good</span></h4>

            <nav class="nav flex-column">
                <a href="dashboard.html" class="nav-link active">Dashboard</a>
                <a class="nav-link">My Scores</a>
                <a class="nav-link">My Draws</a>
                <a class="nav-link">Charity</a>
                <a class="nav-link">Profile</a>
            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main flex-grow-1 p-4">

            <!-- TOPBAR -->
            <div class="topbar d-flex justify-content-between align-items-center mb-4">

                <div class="d-flex align-items-center gap-3">
                    <a href="index.html" class="back-icon">←</a>
                    <h2 class="mb-0">Dashboard</h2>
                </div>

                <button class="btn btn-cta" id="resetBtn">Clear Data</button>
            </div>

            <!-- STATS -->
            <div class="row g-3">

                <div class="col-12 col-lg-4">
                    <div class="card dashboard-card p-3">
                        <p class="lable-text mb-1">Total Entries</p>
                        <h4 id="totalEntries">0</h4>
                    </div>
                </div>

                <div class="col-12 col-lg-4">
                    <div class="card dashboard-card p-3">
                        <p class="lable-text mb-1">Wins</p>
                        <h4 id="totalWins">0</h4>
                    </div>
                </div>

                <div class="col-12 col-lg-4">
                    <div class="card dashboard-card p-3">
                        <p class="lable-text mb-1">Total Donated</p>
                        <h4 id="totalDonated">£0</h4>
                    </div>
                </div>

            </div>

            <!-- SUBMIT SCORE -->
            <div class="card dashboard-card p-4 mt-4">
                <h5 class="mb-3">Submit Score</h5>

                <div class="row g-2">
                    <div class="col-md-5">
                        <input type="number" class="form-control custom-input" id="scoreInput"
                            placeholder="Enter score (1-45)" min="1" max="45">
                    </div>
                    <div class="col-md-4">
                        <input type="date" class="form-control custom-input" id="dateInput">
                    </div>
                    <div class="col-md-3">
                        <button class="btn btn-cta w-100" id="submitBtn">Submit</button>
                    </div>
                </div>
            </div>

            <!-- RECENT ACTIVITY -->
            <div class="card dashboard-card p-4 mt-4">
                <h5 class="mb-3">Recent Activity</h5>

                <ul class="activity-list" id="activityList"></ul>
            </div>

        </main>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="app.js"></script>
</body>

</html>
